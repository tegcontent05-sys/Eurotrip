<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rentao & Silvio's Tour of India - Team Command Center</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: #f5f5f0;
            margin: 0;
            padding: 20px;
            color: #2c2c2a;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            margin-bottom: 24px;
            text-align: center;
            background: linear-gradient(135deg, #0054a6 0%, #0054a6 70%, #ed1c24 70%, #ed1c24 100%);
            padding: 24px;
            border-radius: 12px;
            color: white;
        }
        .header h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 500;
            color: white;
        }
        .header p {
            margin: 4px 0 0 0;
            color: rgba(255,255,255,0.9);
            font-size: 14px;
        }
        .panel {
            background: white;
            padding: 16px;
            border-radius: 12px;
            border: 0.5px solid #d3d1c7;
            margin-bottom: 16px;
        }
        .panel h3 {
            margin: 0 0 12px 0;
            font-size: 15px;
            font-weight: 500;
            color: #0054a6;
            border-bottom: 2px solid #0054a6;
            padding-bottom: 8px;
        }
        .two-column {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 16px;
        }
        @media (max-width: 900px) {
            .two-column {
                grid-template-columns: 1fr;
            }
        }
        .filter-buttons {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }
        .filter-btn {
            padding: 8px 16px;
            font-size: 13px;
            border: 0.5px solid #d3d1c7;
            background: transparent;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .filter-btn.active {
            background: #0054a6;
            color: white;
            border-color: #0054a6;
        }
        .filter-btn.active.rentao {
            background: #ed1c24;
            border-color: #ed1c24;
        }
        .events-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 12px;
        }
        .event-card {
            padding: 12px;
            border: 0.5px solid #d3d1c7;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .event-card.silvio {
            background: rgba(0, 84, 166, 0.05);
            border-color: #0054a6;
            border-left: 4px solid #0054a6;
        }
        .event-card.rentao {
            background: rgba(237, 28, 36, 0.05);
            border-color: #ed1c24;
            border-left: 4px solid #ed1c24;
        }
        .event-card:hover {
            border-color: #615e61;
        }
        .event-date {
            font-size: 12px;
            font-weight: 500;
            color: #615e61;
            margin-bottom: 6px;
        }
        .event-city {
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 4px;
            color: #0054a6;
        }
        .event-type {
            font-size: 12px;
            color: #615e61;
            margin-bottom: 8px;
        }
        .event-venue {
            font-size: 12px;
            padding: 6px;
            background: #f5f5f0;
            border-radius: 4px;
            margin-bottom: 6px;
            min-height: 20px;
        }
        .event-venue.empty {
            color: #ccc;
        }
        .event-edit {
            margin-top: 8px;
            padding-top: 8px;
            border-top: 0.5px solid #d3d1c7;
            display: none;
        }
        .event-edit.show {
            display: block;
        }
        .event-edit input {
            width: 100%;
            padding: 6px 8px;
            font-size: 12px;
            border: 0.5px solid #d3d1c7;
            border-radius: 4px;
            margin-bottom: 6px;
            font-family: inherit;
        }
        .teams-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 16px;
        }
        .team-card {
            background: white;
            border: 0.5px solid #d3d1c7;
            border-radius: 8px;
            padding: 0;
            overflow: hidden;
        }
        .team-header {
            background: #0054a6;
            color: white;
            padding: 12px;
            border-bottom: 0.5px solid #d3d1c7;
            font-weight: 500;
            font-size: 14px;
        }
        .team-tasks {
            padding: 12px;
            max-height: 400px;
            overflow-y: auto;
        }
        .task-item {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            padding: 8px;
            background: #f5f5f0;
            border-radius: 4px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .task-item:hover {
            background: #ede8df;
        }
        .task-item.completed {
            opacity: 0.5;
        }
        .task-checkbox {
            width: 16px;
            height: 16px;
            border: 0.5px solid #d3d1c7;
            border-radius: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            color: white;
            font-weight: bold;
            flex-shrink: 0;
            margin-top: 2px;
        }
        .task-checkbox.checked {
            background: #0054a6;
            border-color: #0054a6;
        }
        .task-text {
            font-size: 12px;
            flex: 1;
            word-break: break-word;
        }
        .task-delete {
            font-size: 12px;
            color: #888;
            cursor: pointer;
            padding: 4px;
        }
        .task-delete:hover {
            color: #ed1c24;
        }
        .add-task {
            display: flex;
            gap: 6px;
            margin-top: 8px;
        }
        .add-task input {
            flex: 1;
            padding: 6px 8px;
            font-size: 12px;
            border: 0.5px solid #d3d1c7;
            border-radius: 4px;
            font-family: inherit;
        }
        .add-task button {
            padding: 6px 12px;
            font-size: 12px;
            border: 0.5px solid #0054a6;
            background: #0054a6;
            color: white;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }
        .add-task button:hover {
            background: #003d7a;
            border-color: #003d7a;
        }
        .content-card {
            background: white;
            border: 0.5px solid #d3d1c7;
            border-radius: 12px;
            padding: 0;
            overflow: hidden;
        }
        .content-header {
            background: #ed1c24;
            color: white;
            padding: 12px 16px;
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .content-header:hover {
            background: #c71619;
        }
        .content-header.collapsed::before {
            content: "▶ ";
            margin-right: 4px;
        }
        .content-header.expanded::before {
            content: "▼ ";
            margin-right: 4px;
        }
        .content-body {
            padding: 12px;
            display: none;
        }
        .content-body.show {
            display: block;
        }
        .item-list {
            max-height: 300px;
            overflow-y: auto;
            margin-bottom: 12px;
        }
        .item {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            padding: 8px;
            background: #f5f5f0;
            border-radius: 4px;
            margin-bottom: 8px;
            border-left: 3px solid #0054a6;
        }
        .item-delete {
            font-size: 12px;
            color: #888;
            cursor: pointer;
            padding: 4px;
            margin-left: auto;
        }
        .item-delete:hover {
            color: #ed1c24;
        }
        .item-text {
            font-size: 12px;
            flex: 1;
            word-break: break-word;
        }
        .add-item {
            display: flex;
            gap: 6px;
        }
        .add-item input {
            flex: 1;
            padding: 6px 8px;
            font-size: 12px;
            border: 0.5px solid #d3d1c7;
            border-radius: 4px;
            font-family: inherit;
        }
        .add-item button {
            padding: 6px 12px;
            font-size: 12px;
            border: 0.5px solid #ed1c24;
            background: #ed1c24;
            color: white;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }
        .add-item button:hover {
            background: #c71619;
            border-color: #c71619;
        }
        .status-indicator {
            font-size: 11px;
            color: #0054a6;
            text-align: center;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 0.5px solid #d3d1c7;
            font-weight: 500;
        }
        .status-indicator.loading {
            color: #615e61;
        }
        .status-indicator.error {
            color: #ed1c24;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Rentao & Silvio's Tour of India - Team Command Center</h1>
            <p>22 June – 2 July 2026 | Real-time collaborative tracker</p>
        </div>

        <!-- Events Section -->
        <div class="panel">
            <h3>Events</h3>
            <div class="filter-buttons">
                <button class="filter-btn active" onclick="setEventFilter('all')">All</button>
                <button class="filter-btn" onclick="setEventFilter('Silvio')">Silvio</button>
                <button class="filter-btn rentao" onclick="setEventFilter('Rentao')">Rentao</button>
            </div>
            <div class="events-grid" id="events-grid"></div>
        </div>

        <!-- Team Tasks Section -->
        <div class="panel">
            <h3>Team Tasks</h3>
            <div class="teams-grid" id="teams-grid"></div>
        </div>

        <!-- Content & Logistics Side by Side -->
        <div class="two-column">
            <!-- Content Panel -->
            <div class="content-card">
                <div class="content-header expanded" onclick="toggleSection('content')">Content</div>
                <div class="content-body show" id="content-section">
                    <div class="item-list" id="content-list"></div>
                    <div class="add-item">
                        <input type="text" id="content-input" placeholder="Add content item..." onkeypress="if(event.key==='Enter') addItem('content')">
                        <button onclick="addItem('content')">Add</button>
                    </div>
                </div>
            </div>

            <!-- Logistics Panel -->
            <div class="content-card">
                <div class="content-header expanded" onclick="toggleSection('logistics')">Logistics</div>
                <div class="content-body show" id="logistics-section">
                    <div class="item-list" id="logistics-list"></div>
                    <div class="add-item">
                        <input type="text" id="logistics-input" placeholder="Add logistics item..." onkeypress="if(event.key==='Enter') addItem('logistics')">
                        <button onclick="addItem('logistics')">Add</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="status-indicator" id="status">Connecting to Firebase...</div>
    </div>

    <script>
        const TEAM_MEMBERS = ['Saurabh', 'Anand', 'Chandrika', 'Prashant', 'Kannan', 'Kavitha', 'Shreya', 'Sanket', 'Sanjay', 'Aswathy'];
        
        const firebaseConfig = {
            apiKey: "AIzaSyATDlSAso_v4WFreXueNyd-VKARi8p4QTc",
            authDomain: "eurogrip-tour.firebaseapp.com",
            databaseURL: "https://eurogrip-tour-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "eurogrip-tour",
            storageBucket: "eurogrip-tour.firebasestorage.app",
            messagingSenderId: "35936399543",
            appId: "1:35936399543:web:be23bb53ecfd66114b1d32"
        };

        let db = null;
        let data = {
            events: [],
            tasks: {},
            content: [],
            logistics: [],
            eventFilter: 'all'
        };

        TEAM_MEMBERS.forEach(member => {
            data.tasks[member] = [];
        });

        function initializeEvents() {
            data.events = [
                { id: 'r1', date: '22 Jun', guest: 'Rentao', city: 'Delhi', type: 'Retailer Meet', venue: '', lead: 'Kannan' },
                { id: 'r2', date: '23 Jun', guest: 'Rentao', city: 'Hathras', type: 'Dealer Meet', venue: '', lead: 'Chandrika' },
                { id: 'r3', date: '24 Jun', guest: 'Rentao', city: 'Noida', type: 'Dealer Meet', venue: '', lead: 'Chandrika' },
                { id: 'r4', date: '25 Jun', guest: 'Rentao', city: 'Faridabad', type: 'Dealer Meet', venue: '', lead: 'Chandrika' },
                { id: 'r5', date: '26 Jun', guest: 'Rentao', city: 'Kolkata', type: 'Retailer Meet', venue: '', lead: 'Sanket' },
                { id: 'r6', date: '27 Jun', guest: 'Rentao', city: 'Bangalore', type: 'Retailer Meet', venue: '', lead: 'Shreya' },
                { id: 's1', date: '23 Jun', guest: 'Silvio', city: 'Hyderabad', type: 'Distributor Meet', venue: '', lead: 'Anand' },
                { id: 's2', date: '24 Jun', guest: 'Silvio', city: 'Hyderabad', type: 'Retailer Meet + Inauguration', venue: '', lead: 'Anand' },
                { id: 's3', date: '25 Jun', guest: 'Silvio', city: 'Raipur', type: 'Retailer Meet', venue: '', lead: 'Sanjay' },
                { id: 's4', date: '26 Jun', guest: 'Silvio', city: 'Indore', type: 'Retailer Meet + Podcast', venue: '', lead: 'Prashant' },
                { id: 's5', date: '27 Jun', guest: 'Silvio', city: 'Mumbai', type: 'Distributor Meet', venue: '', lead: 'Saurabh' },
                { id: 's6', date: '2 Jul', guest: 'Silvio', city: 'Madurai', type: 'Retailer Meet + Tech', venue: '', lead: 'Aswathy' },
            ];
        }

        function initFirebase() {
            try {
                firebase.initializeApp(firebaseConfig);
                db = firebase.database();
                loadDataFromFirebase();
                updateStatus('✓ Connected to Firebase', false);
            } catch (error) {
                console.error('Firebase init error:', error);
                updateStatus('✗ Firebase Error', true, true);
            }
        }

        function loadDataFromFirebase() {
            db.ref('events').on('value', (snapshot) => {
                if (snapshot.val()) {
                    data.events = snapshot.val();
                } else {
                    db.ref('events').set(data.events);
                }
                renderEvents();
            });

            db.ref('tasks').on('value', (snapshot) => {
                if (snapshot.val()) {
                    data.tasks = snapshot.val();
                } else {
                    db.ref('tasks').set(data.tasks);
                }
                renderTeams();
            });

            db.ref('content').on('value', (snapshot) => {
                if (snapshot.val()) {
                    data.content = snapshot.val();
                } else {
                    db.ref('content').set(data.content);
                }
                renderContent();
            });

            db.ref('logistics').on('value', (snapshot) => {
                if (snapshot.val()) {
                    data.logistics = snapshot.val();
                } else {
                    db.ref('logistics').set(data.logistics);
                }
                renderLogistics();
            });
        }

        function saveData() {
            if (!db) return;
            updateStatus('Saving...', true);
            db.ref('events').set(data.events);
            db.ref('tasks').set(data.tasks);
            db.ref('content').set(data.content);
            db.ref('logistics').set(data.logistics);
            setTimeout(() => updateStatus('✓ Saved', false), 500);
        }

        function updateStatus(msg, isLoading, isError) {
            const status = document.getElementById('status');
            status.textContent = msg;
            status.className = isError ? 'status-indicator error' : (isLoading ? 'status-indicator loading' : 'status-indicator');
        }

        function setEventFilter(filter) {
            data.eventFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderEvents();
        }

        function updateEventVenue(id, venue) {
            const evt = data.events.find(e => e.id === id);
            if (evt) {
                evt.venue = venue;
                saveData();
            }
        }

        function toggleEventEdit(id) {
            const card = document.getElementById(`event-${id}`);
            if (card) {
                const editDiv = card.querySelector('.event-edit');
                editDiv.classList.toggle('show');
            }
        }

        function addTask(member) {
            const input = document.getElementById(`task-input-${member}`);
            const taskText = input.value.trim();
            
            if (taskText) {
                if (!data.tasks[member]) {
                    data.tasks[member] = [];
                }
                data.tasks[member].push({
                    id: Date.now(),
                    text: taskText,
                    completed: false
                });
                input.value = '';
                saveData();
                renderTeams();
            }
        }

        function toggleTask(member, taskId) {
            if (data.tasks[member]) {
                const task = data.tasks[member].find(t => t.id === taskId);
                if (task) {
                    task.completed = !task.completed;
                    saveData();
                    renderTeams();
                }
            }
        }

        function deleteTask(member, taskId) {
            if (data.tasks[member]) {
                data.tasks[member] = data.tasks[member].filter(t => t.id !== taskId);
                saveData();
                renderTeams();
            }
        }

        function toggleSection(section) {
            const header = event.target;
            const content = document.getElementById(`${section}-section`);
            
            header.classList.toggle('expanded');
            header.classList.toggle('collapsed');
            content.classList.toggle('show');
        }

        function addItem(section) {
            const input = document.getElementById(`${section}-input`);
            const itemText = input.value.trim();
            
            if (itemText) {
                if (section === 'content') {
                    data.content.push({
                        id: Date.now(),
                        text: itemText
                    });
                } else if (section === 'logistics') {
                    data.logistics.push({
                        id: Date.now(),
                        text: itemText
                    });
                }
                input.value = '';
                saveData();
            }
        }

        function deleteItem(section, itemId) {
            if (section === 'content') {
                data.content = data.content.filter(i => i.id !== itemId);
            } else if (section === 'logistics') {
                data.logistics = data.logistics.filter(i => i.id !== itemId);
            }
            saveData();
        }

        function renderEvents() {
            const filteredEvents = data.eventFilter === 'all' ? 
                data.events : 
                data.events.filter(e => e.guest === data.eventFilter);

            let html = '';
            for (const evt of filteredEvents) {
                const guestClass = evt.guest === 'Silvio' ? 'silvio' : 'rentao';
                const venueDisplay = evt.venue ? evt.venue : '<span class="empty">No venue yet</span>';

                html += `
                    <div class="event-card ${guestClass}" id="event-${evt.id}" onclick="toggleEventEdit('${evt.id}')">
                        <div class="event-date">${evt.date} • ${evt.guest}</div>
                        <div class="event-city">${evt.city}</div>
                        <div class="event-type">${evt.type}</div>
                        <div class="event-venue">${venueDisplay}</div>
                        <div style="font-size: 11px; color: #615e61;">Lead: ${evt.lead}</div>
                        <div class="event-edit">
                            <input type="text" placeholder="Enter venue address..." value="${evt.venue}" onchange="updateEventVenue('${evt.id}', this.value)">
                            <div style="font-size: 11px; color: #615e61;">Click outside to close</div>
                        </div>
                    </div>
                `;
            }

            document.getElementById('events-grid').innerHTML = html;
        }

        function renderTeams() {
            let html = '';
            
            for (const member of TEAM_MEMBERS) {
                const tasks = data.tasks[member] || [];
                const completedCount = tasks.filter(t => t.completed).length;

                let tasksHtml = '';
                for (const task of tasks) {
                    const completedClass = task.completed ? 'completed' : '';
                    tasksHtml += `
                        <div class="task-item ${completedClass}" onclick="toggleTask('${member}', ${task.id})">
                            <div class="task-checkbox ${task.completed ? 'checked' : ''}">
                                ${task.completed ? '✓' : ''}
                            </div>
                            <div class="task-text">${task.text}</div>
                            <div class="task-delete" onclick="event.stopPropagation(); deleteTask('${member}', ${task.id})">×</div>
                        </div>
                    `;
                }

                html += `
                    <div class="team-card">
                        <div class="team-header">
                            ${member} <span style="color: rgba(255,255,255,0.8); font-weight: normal; font-size: 12px;">(${completedCount}/${tasks.length})</span>
                        </div>
                        <div class="team-tasks">
                            ${tasksHtml || '<div style="font-size: 12px; color: #ccc; padding: 12px; text-align: center;">No tasks yet</div>'}
                            <div class="add-task">
                                <input type="text" id="task-input-${member}" placeholder="Add task..." onkeypress="if(event.key==='Enter') addTask('${member}')">
                                <button onclick="addTask('${member}')">Add</button>
                            </div>
                        </div>
                    </div>
                `;
            }

            document.getElementById('teams-grid').innerHTML = html;
        }

        function renderContent() {
            let html = '';
            for (const item of data.content) {
                html += `
                    <div class="item">
                        <div class="item-text">${item.text}</div>
                        <div class="item-delete" onclick="deleteItem('content', ${item.id})">×</div>
                    </div>
                `;
            }
            document.getElementById('content-list').innerHTML = html || '<div style="font-size: 12px; color: #ccc; text-align: center; padding: 12px;">No items yet</div>';
        }

        function renderLogistics() {
            let html = '';
            for (const item of data.logistics) {
                html += `
                    <div class="item">
                        <div class="item-text">${item.text}</div>
                        <div class="item-delete" onclick="deleteItem('logistics', ${item.id})">×</div>
                    </div>
                `;
            }
            document.getElementById('logistics-list').innerHTML = html || '<div style="font-size: 12px; color: #ccc; text-align: center; padding: 12px;">No items yet</div>';
        }

        function init() {
            initializeEvents();
            renderEvents();
            renderTeams();
            renderContent();
            renderLogistics();
            initFirebase();
        }

        init();
    </script>
</body>
</html>
